<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .keywords {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: white;
        }

        .keywords strong {
            display: block;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .keywords-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .keyword-tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.95em;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button.secondary {
            background: #666;
        }

        button.secondary:hover {
            background: #555;
        }

        button.danger {
            background: #e74c3c;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        button.danger:hover {
            background: #c0392b;
        }

        .accounts-list {
            margin-top: 30px;
        }

        .account-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .account-info {
            flex: 1;
        }

        .account-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .account-info p {
            color: #666;
            font-size: 0.9em;
            margin: 3px 0;
        }

        .account-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toggle-btn {
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .toggle-btn.disabled {
            background: #ccc;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status {
            font-size: 0.85em;
            font-weight: 600;
        }

        .status.active {
            color: #28a745;
        }

        .status.inactive {
            color: #dc3545;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .account-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .account-actions {
                width: 100%;
                margin-top: 15px;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 LinkedIn Monitor</h1>
            <p class="subtitle">Monitor multiple LinkedIn accounts for keyword mentions</p>
            
            <div class="keywords">
                <strong>📌 Monitoring Keywords:</strong>
                <div class="keywords-list">
                    <div class="keyword-tag">HRIS</div>
                    <div class="keyword-tag">Payroll System</div>
                    <div class="keyword-tag">Managed Services</div>
                    <div class="keyword-tag">Payroll Outsourcing</div>
                    <div class="keyword-tag">Sprout Solutions</div>
                </div>
            </div>
        </header>

        <div id="message" class="message"></div>

        <!-- Add Account Form -->
        <div class="card">
            <h2>➕ Add New LinkedIn Account</h2>
            <form id="addAccountForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>LinkedIn Email</label>
                        <input type="email" id="linkedinEmail" placeholder="your@linkedin.email" required>
                    </div>
                    <div class="form-group">
                        <label>LinkedIn Password</label>
                        <input type="password" id="linkedinPassword" placeholder="Your LinkedIn password" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Notification Email (Gmail)</label>
                        <input type="email" id="notificationEmail" placeholder="your@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Gmail App Password</label>
                        <input type="password" id="appPassword" placeholder="16-character app password" required>
                    </div>
                </div>

                <button type="submit">Add Account</button>
            </form>
        </div>

        <!-- Accounts List -->
        <div class="card">
            <h2>📋 Your Accounts</h2>
            <div id="accountsList" class="accounts-list">
                <p style="color: #999; text-align: center;">Loading accounts...</p>
            </div>

            <div class="action-buttons">
                <button class="secondary" onclick="checkNow()">🚀 Check Now</button>
                <button class="secondary" onclick="loadAccounts()">🔄 Refresh</button>
            </div>
        </div>
    </div>

    <script>
        async function loadAccounts() {
            try {
                const response = await fetch('/api/accounts');
                const accounts = await response.json();
                
                const accountsList = document.getElementById('accountsList');
                
                if (accounts.length === 0) {
                    accountsList.innerHTML = '<p style="color: #999; text-align: center;">No accounts added yet</p>';
                    return;
                }

                accountsList.innerHTML = accounts.map(account => `
                    <div class="account-item">
                        <div class="account-info">
                            <h3>${account.linkedinEmail}</h3>
                            <p>📧 Notifications to: ${account.notificationEmail}</p>
                            <p>Status: <span class="status ${account.enabled ? 'active' : 'inactive'}">
                                ${account.enabled ? '✓ Active' : '✗ Paused'}
                            </span></p>
                            <p style="color: #999; font-size: 0.85em;">Added: ${new Date(account.createdAt).toLocaleDateString()}</p>
                        </div>
                        <div class="account-actions">
                            <button class="toggle-btn ${!account.enabled ? 'disabled' : ''}" 
                                    onclick="toggleAccount('${account.id}', ${!account.enabled})">
                                ${account.enabled ? '⏸ Pause' : '▶ Resume'}
                            </button>
                            <button class="danger" onclick="deleteAccount('${account.id}')">🗑 Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('Error loading accounts', 'error');
                console.error(error);
            }
        }

        async function toggleAccount(id, enable) {
            try {
                await fetch(`/api/accounts/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: enable })
                });
                showMessage(`Account ${enable ? 'resumed' : 'paused'}`, 'success');
                loadAccounts();
            } catch (error) {
                showMessage('Error updating account', 'error');
            }
        }

        async function deleteAccount(id) {
            if (!confirm('Are you sure you want to delete this account?')) return;
            
            try {
                await fetch(`/api/accounts/${id}`, { method: 'DELETE' });
                showMessage('Account deleted', 'success');
                loadAccounts();
            } catch (error) {
                showMessage('Error deleting account', 'error');
            }
        }

        async function checkNow() {
            try {
                const button = event.target;
                button.disabled = true;
                button.textContent = '⏳ Checking...';

                await fetch('/api/monitor-now', { method: 'POST' });
                showMessage('✅ Monitoring check started! You\'ll receive emails if posts match keywords.', 'success');
                
                button.disabled = false;
                button.textContent = '🚀 Check Now';
            } catch (error) {
                showMessage('Error starting monitoring', 'error');
                button.disabled = false;
                button.textContent = '🚀 Check Now';
            }
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            
            setTimeout(() => {
                messageEl.className = 'message';
            }, 5000);
        }

        document.getElementById('addAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                linkedinEmail: document.getElementById('linkedinEmail').value,
                linkedinPassword: document.getElementById('linkedinPassword').value,
                notificationEmail: document.getElementById('notificationEmail').value,
                appPassword: document.getElementById('appPassword').value
            };

            try {
                const response = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    showMessage('✅ Account added successfully!', 'success');
                    document.getElementById('addAccountForm').reset();
                    loadAccounts();
                } else {
                    showMessage('Error adding account', 'error');
                }
            } catch (error) {
                showMessage('Error adding account', 'error');
                console.error(error);
            }
        });

        // Load accounts on page load
        loadAccounts();
    </script>
</body>
</html>
